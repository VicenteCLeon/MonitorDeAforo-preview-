# =============================================================================
#  Monitor de Aforo — nginx.conf
#  Reemplaza TU_DOMINIO por el dominio real (ej: aforo.pucv.cl)
#  Ubicación en el servidor: /etc/nginx/sites-available/monitor-aforo
# =============================================================================

# ── Redirige todo HTTP → HTTPS ──────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name TU_DOMINIO;

    # Certbot escribe aquí durante la validación de dominio
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name TU_DOMINIO;

    # ── Certificados (generados por certbot) ─────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO/privkey.pem;

    # ── Parámetros TLS modernos (Mozilla Intermediate) ───────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout          5s;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN                            always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # ── Límite de subida (por si se añade upload de imágenes en el futuro) ───
    client_max_body_size 10M;

    # ── Frontend React (archivos estáticos) ──────────────────────────────────
    root /var/www/monitor-aforo;
    index index.html;

    location / {
        # SPA: cualquier ruta desconocida devuelve index.html
        try_files $uri $uri/ /index.html;
    }

    # Cache agresivo para assets con hash en el nombre (Vite los genera así)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API REST → FastAPI :8000 ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts razonables para las llamadas normales
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── Health check → FastAPI ────────────────────────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Video stream MJPEG → FastAPI (streaming: sin buffering) ──────────────
    location /video_feed/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # CRÍTICO para MJPEG: nginx NO debe acumular el stream en un buffer
        proxy_buffering            off;
        proxy_cache                off;
        proxy_request_buffering    off;

        # El stream puede durar horas; timeout largo
        proxy_read_timeout         3600s;
        proxy_send_timeout         3600s;

        # Desactiva compresión para el stream (no ayuda y consume CPU)
        gzip off;
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/monitor-aforo.access.log;
    error_log  /var/log/nginx/monitor-aforo.error.log warn;
}
